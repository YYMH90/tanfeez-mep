<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — TANFEEZ.MEP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="login-form">
      <div class="logo"><img src="assets/logo.jpg" alt="TANFEEZ.MEP" /></div>
      <p class="tagline">نظام إدارة شركة المقاولات — سجّل دخولك بحسابك</p>

      <div class="field">
        <label for="username">اسم المستخدم</label>
        <input id="username" name="username" type="text" dir="ltr" placeholder="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">كلمة المرور</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <p id="login-err" style="display:none;color:var(--danger);font-size:13px;text-align:start;margin:0 0 12px">
        <i class="ti ti-alert-circle" style="vertical-align:-2px"></i> اسم المستخدم أو كلمة المرور غير صحيحة
      </p>

      <button type="submit" class="btn-primary">تسجيل الدخول</button>

      <p class="login-foot">
        TANFEEZ Contracting W.L.L
        <svg class="flag-inline" viewBox="0 0 30 20" width="18" height="12" aria-label="الأردن"><rect width="30" height="20" fill="#fff"/><rect width="30" height="6.67" fill="#000"/><rect width="30" height="6.66" y="13.34" fill="#007a3d"/><polygon points="0,0 15,10 0,20" fill="#ce1126"/><circle cx="4.6" cy="10" r="1.5" fill="#fff"/></svg>
      </p>
    </form>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
